# name: install_k3s
# description: Install and configure k3s server on control nodes and agents on cluster nodes.
# target: both
# requires_approval: true
# tags:
#   - k3s
#   - installation
#   - configuration

---
- name: Install and configure k3s server on control nodes
  hosts: control
  become: true
  gather_facts: true
  vars:
    k3s_version: "v1.30.2+k3s2"
    k3s_install_script_url: "https://get.k3s.io"
    k3s_server_service: "k3s"
    k3s_server_binary: "/usr/local/bin/k3s"
    k3s_server_config: "/etc/rancher/k3s/config.yaml"
    k3s_token_file: "/var/lib/rancher/k3s/server/node-token"
    k3s_kubeconfig_src: "/etc/rancher/k3s/k3s.yaml"
    k3s_kubeconfig_dest: "/root/.kube/config"
    k3s_server_extra_args: []
  tasks:
    - name: Ensure required packages are present
      ansible.builtin.package:
        name:
          - curl
          - ca-certificates
        state: present

    - name: Ensure k3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write k3s server config
      ansible.builtin.copy:
        dest: "{{ k3s_server_config }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          write-kubeconfig-mode: "0644"
          tls-san:
            - "{{ ansible_default_ipv4.address }}"
          node-ip: "{{ ansible_default_ipv4.address }}"
          {% if k3s_server_extra_args | length > 0 %}
          {% for arg in k3s_server_extra_args %}
          {{ arg.key }}: {{ arg.value | to_json }}
          {% endfor %}
          {% endif %}
      notify: Restart k3s server

    - name: Check whether k3s server binary is installed
      ansible.builtin.stat:
        path: "{{ k3s_server_binary }}"
      register: k3s_server_bin_stat

    - name: Check installed k3s server version
      ansible.builtin.command: "{{ k3s_server_binary }} --version"
      register: k3s_server_version_cmd
      changed_when: false
      failed_when: false
      when: k3s_server_bin_stat.stat.exists

    - name: Install or upgrade k3s server
      ansible.builtin.shell: |
        set -o pipefail
        curl -sfL {{ k3s_install_script_url }} | INSTALL_K3S_VERSION='{{ k3s_version }}' sh -
      args:
        executable: /bin/bash
      environment:
        INSTALL_K3S_EXEC: "server"
      when: >-
        (not k3s_server_bin_stat.stat.exists) or
        (k3s_server_version_cmd.stdout is not defined) or
        (k3s_version not in k3s_server_version_cmd.stdout)

    - name: Ensure k3s server service is enabled and started
      ansible.builtin.systemd:
        name: "{{ k3s_server_service }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for k3s node token to exist
      ansible.builtin.wait_for:
        path: "{{ k3s_token_file }}"
        state: present
        timeout: 300

    - name: Read k3s node token
      ansible.builtin.slurp:
        src: "{{ k3s_token_file }}"
      register: k3s_node_token_raw
      no_log: true

    - name: Set k3s join facts for cluster nodes
      ansible.builtin.set_fact:
        k3s_server_url: "https://{{ ansible_default_ipv4.address }}:6443"
        k3s_node_token: "{{ k3s_node_token_raw.content | b64decode | trim }}"
      delegate_facts: true
      delegate_to: "{{ item }}"
      loop: "{{ groups['cluster'] | default([]) }}"
      no_log: true

    - name: Ensure root kubeconfig directory exists
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Copy kubeconfig for root convenience
      ansible.builtin.copy:
        src: "{{ k3s_kubeconfig_src }}"
        dest: "{{ k3s_kubeconfig_dest }}"
        remote_src: true
        owner: root
        group: root
        mode: "0600"

  handlers:
    - name: Restart k3s server
      ansible.builtin.systemd:
        name: "{{ k3s_server_service }}"
        state: restarted
        daemon_reload: true

- name: Install and configure k3s agents on cluster nodes
  hosts: cluster
  become: true
  gather_facts: true
  vars:
    k3s_version: "v1.30.2+k3s2"
    k3s_install_script_url: "https://get.k3s.io"
    k3s_agent_service: "k3s-agent"
    k3s_agent_binary: "/usr/local/bin/k3s"
    k3s_agent_config: "/etc/rancher/k3s/config.yaml"
    k3s_agent_extra_args: []
  pre_tasks:
    - name: Fail if control group is empty
      ansible.builtin.fail:
        msg: "Inventory group 'control' must contain at least one host."
      when: groups['control'] | default([]) | length == 0

    - name: Fail if k3s join facts are missing
      ansible.builtin.fail:
        msg: "Missing k3s join information from control host. Run the control play first."
      when:
        - hostvars[inventory_hostname].k3s_server_url is not defined or hostvars[inventory_hostname].k3s_node_token is not defined

    - name: Ensure required packages are present
      ansible.builtin.package:
        name:
          - curl
          - ca-certificates
        state: present

    - name: Ensure k3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

  tasks:
    - name: Write k3s agent config
      ansible.builtin.copy:
        dest: "{{ k3s_agent_config }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          server: "{{ hostvars[inventory_hostname].k3s_server_url }}"
          token: "{{ hostvars[inventory_hostname].k3s_node_token }}"
          node-ip: "{{ ansible_default_ipv4.address }}"
          {% if k3s_agent_extra_args | length > 0 %}
          {% for arg in k3s_agent_extra_args %}
          {{ arg.key }}: {{ arg.value | to_json }}
          {% endfor %}
          {% endif %}
      notify: Restart k3s agent
      no_log: true

    - name: Check whether k3s binary is installed
      ansible.builtin.stat:
        path: "{{ k3s_agent_binary }}"
      register: k3s_agent_bin_stat

    - name: Check installed k3s agent version
      ansible.builtin.command: "{{ k3s_agent_binary }} --version"
      register: k3s_agent_version_cmd
      changed_when: false
      failed_when: false
      when: k3s_agent_bin_stat.stat.exists

    - name: Install or upgrade k3s agent
      ansible.builtin.shell: |
        set -o pipefail
        curl -sfL {{ k3s_install_script_url }} | INSTALL_K3S_VERSION='{{ k3s_version }}' K3S_URL='{{ hostvars[inventory_hostname].k3s_server_url }}' K3S_TOKEN='{{ hostvars[inventory_hostname].k3s_node_token }}' sh -
      args:
        executable: /bin/bash
      environment:
        INSTALL_K3S_EXEC: "agent"
      when: >-
        (not k3s_agent_bin_stat.stat.exists) or
        (k3s_agent_version_cmd.stdout is not defined) or
        (k3s_version not in k3s_agent_version_cmd.stdout)
      no_log: true

    - name: Ensure k3s agent service is enabled and started
      ansible.builtin.systemd:
        name: "{{ k3s_agent_service }}"
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart k3s agent
      ansible.builtin.systemd:
        name: "{{ k3s_agent_service }}"
        state: restarted
        daemon_reload: true
