# name: repair_kubernetes_kubeconfig
# description: Diagnose and repair Kubernetes client configuration on the control host, ensuring kubectl and helm are installed; validates repair via access checks and records diagnostic outputs, requiring approval due to system modifications.
# target: control
# requires_approval: true
# tags:
#   - kubernetes
#   - repair
#   - client
#   - diagnostics
#   - kubeconfig

---
- name: Diagnose and repair Kubernetes client configuration on control host
  hosts: control
  become: true
  gather_facts: true
  vars:
    kubeconfig_repair_reset: false
    kubeconfig_target_user: "{{ ansible_user_id | default(ansible_env.SUDO_USER | default(ansible_env.USER)) }}"
    kubeconfig_target_home: >-
      {{
        (ansible_facts.getent_passwd[kubeconfig_target_user][4]
          if (ansible_facts.getent_passwd is defined and kubeconfig_target_user in ansible_facts.getent_passwd)
          else ('/root' if kubeconfig_target_user == 'root' else '/home/' ~ kubeconfig_target_user))
      }}
    kubeconfig_target_dir: "{{ kubeconfig_target_home }}/.kube"
    kubeconfig_target_file: "{{ kubeconfig_target_dir }}/config"
    candidate_kubeconfigs:
      - /etc/rancher/k3s/k3s.yaml
      - /etc/kubernetes/admin.conf
      - /root/.kube/config
      - "{{ kubeconfig_target_file }}"
    kubectl_env_effective:
      KUBECONFIG: "{{ lookup('ansible.builtin.env', 'KUBECONFIG', default='') }}"
    k3s_service_candidates:
      - k3s
      - k3s-server
  tasks:
    - name: Gather passwd database entries for target user resolution
      ansible.builtin.getent:
        database: passwd

    - name: Ensure optional reset state for user kubeconfig is absent when requested
      ansible.builtin.file:
        path: "{{ kubeconfig_target_file }}"
        state: absent
      when: kubeconfig_repair_reset | bool

    - name: Check whether kubectl is installed on control host
      ansible.builtin.command: kubectl version --client=true --output=yaml
      register: kubectl_client_check
      changed_when: false
      failed_when: false

    - name: Assert kubectl is installed on control host
      ansible.builtin.assert:
        that:
          - kubectl_client_check.rc == 0
        fail_msg: >-
          kubectl is not installed or not executable on the control host.
          Install kubectl before running this playbook.
        success_msg: kubectl client is installed.

    - name: Check whether helm is installed on control host
      ansible.builtin.command: helm version --template '{{"{{"}} .Version {{"}}"}}'
      register: helm_client_check
      changed_when: false
      failed_when: false

    - name: Assert helm is installed on control host
      ansible.builtin.assert:
        that:
          - helm_client_check.rc == 0
        fail_msg: >-
          helm is not installed or not executable on the control host.
          Install helm before running this playbook.
        success_msg: helm client is installed.

    - name: Capture current KUBECONFIG environment variable
      ansible.builtin.set_fact:
        current_kubeconfig_env: "{{ lookup('ansible.builtin.env', 'KUBECONFIG', default='') }}"

    - name: Diagnose kubectl current-context using current environment
      ansible.builtin.command: kubectl config current-context
      environment: "{{ kubectl_env_effective }}"
      register: kubectl_current_context
      changed_when: false
      failed_when: false

    - name: Diagnose kubectl config view using current environment
      ansible.builtin.command: kubectl config view --raw -o json
      environment: "{{ kubectl_env_effective }}"
      register: kubectl_config_view_current
      changed_when: false
      failed_when: false

    - name: Diagnose kubectl cluster-info using current environment
      ansible.builtin.command: kubectl cluster-info
      environment: "{{ kubectl_env_effective }}"
      register: kubectl_cluster_info_current
      changed_when: false
      failed_when: false

    - name: Record current kubectl diagnostics
      ansible.builtin.set_fact:
        kubectl_current_config_json: >-
          {{
            (kubectl_config_view_current.stdout | from_json)
            if (kubectl_config_view_current.rc == 0 and (kubectl_config_view_current.stdout | length > 0))
            else {}
          }}
        kubectl_current_context_name: "{{ kubectl_current_context.stdout | default('') | trim }}"

    - name: Build current kubeconfig server diagnostics
      ansible.builtin.set_fact:
        current_kubeconfig_servers: "{{ (kubectl_current_config_json.clusters | default([])) | map(attribute='cluster') | map(attribute='server') | list }}"
        current_kubeconfig_contexts: "{{ (kubectl_current_config_json.contexts | default([])) | map(attribute='name') | list }}"

    - name: Check candidate kubeconfig file presence
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ candidate_kubeconfigs | unique }}"
      register: candidate_kubeconfig_stats

    - name: Discover k3s service state candidates
      ansible.builtin.systemd:
        name: "{{ item }}"
      loop: "{{ k3s_service_candidates }}"
      register: k3s_service_checks
      changed_when: false
      failed_when: false

    - name: Select active k3s service if present
      ansible.builtin.set_fact:
        active_k3s_services: >-
          {{
            k3s_service_checks.results
            | selectattr('status', 'defined')
            | selectattr('status.LoadState', 'defined')
            | selectattr('status.LoadState', 'equalto', 'loaded')
            | map(attribute='item')
            | list
          }}

    - name: Probe candidate kubeconfig files for current-context
      ansible.builtin.command: kubectl --kubeconfig {{ item.item }} config current-context
      loop: "{{ candidate_kubeconfig_stats.results }}"
      when: item.stat.exists | default(false)
      register: candidate_context_checks
      changed_when: false
      failed_when: false

    - name: Probe candidate kubeconfig files for config view
      ansible.builtin.command: kubectl --kubeconfig {{ item.item }} config view --raw -o json
      loop: "{{ candidate_kubeconfig_stats.results }}"
      when: item.stat.exists | default(false)
      register: candidate_config_views
      changed_when: false
      failed_when: false

    - name: Probe candidate kubeconfig files for cluster reachability
      ansible.builtin.command: kubectl --kubeconfig {{ item.item }} get nodes -o json
      loop: "{{ candidate_kubeconfig_stats.results }}"
      when: item.stat.exists | default(false)
      register: candidate_node_checks
      changed_when: false
      failed_when: false

    - name: Initialize evaluated kubeconfig candidate data
      ansible.builtin.set_fact:
        evaluated_kubeconfigs: []

    - name: Build evaluated kubeconfig candidate data
      ansible.builtin.set_fact:
        evaluated_kubeconfigs: "{{ evaluated_kubeconfigs + [ {
          'path': item.item.item,
          'exists': true,
          'context_rc': (context_result.rc | default(1)),
          'current_context': (context_result.stdout | default('') | trim),
          'view_rc': (item.rc | default(1)),
          'servers': candidate_servers,
          'node_check_rc': (node_result.rc | default(1)),
          'node_count': candidate_node_count,
          'localhost_server': candidate_has_localhost_server,
          'healthy': ((node_result.rc | default(1)) == 0)
        } ] }}"
      loop: "{{ candidate_config_views.results | default([]) }}"
      vars:
        context_result: >-
          {{
            (candidate_context_checks.results | default([])
            | selectattr('item.item', 'equalto', item.item.item)
            | list | first) | default({})
          }}
        node_result: >-
          {{
            (candidate_node_checks.results | default([])
            | selectattr('item.item', 'equalto', item.item.item)
            | list | first) | default({})
          }}
        candidate_config_json: >-
          {{
            (item.stdout | from_json)
            if (item.rc == 0 and (item.stdout | default('') | length > 0))
            else {}
          }}
        candidate_clusters: "{{ candidate_config_json['clusters'] | default([]) }}"
        candidate_servers: "{{ candidate_clusters | map(attribute='cluster') | map(attribute='server') | list }}"
        candidate_node_json: >-
          {{
            (node_result.stdout | from_json)
            if (node_result.rc == 0 and (node_result.stdout | default('') | length > 0))
            else {}
          }}
        candidate_node_items: "{{ candidate_node_json['items'] | default([]) }}"
        candidate_node_count: "{{ candidate_node_items | length }}"
        candidate_has_localhost_server: >-
          {{
            (candidate_servers
             | select('search', 'http://localhost:8080|https://localhost:8080|127\\.0\\.0\\.1')
             | list | length) > 0
          }}
      when: item.skipped is not defined

    - name: Select preferred healthy kubeconfig source
      ansible.builtin.set_fact:
        preferred_kubeconfig: >-
          {{
            (
              (evaluated_kubeconfigs | default([])
                | selectattr('path', 'equalto', '/etc/rancher/k3s/k3s.yaml')
                | selectattr('healthy', 'equalto', true)
                | list
              )
              +
              (evaluated_kubeconfigs | default([])
                | rejectattr('path', 'equalto', '/etc/rancher/k3s/k3s.yaml')
                | selectattr('healthy', 'equalto', true)
                | list
              )
            ) | first | default({})
          }}

    - name: Detect whether a k3s cluster is installed
      ansible.builtin.set_fact:
        k3s_installed: "{{ (active_k3s_services | length > 0) or ('/etc/rancher/k3s/k3s.yaml' in ((evaluated_kubeconfigs | default([])) | map(attribute='path') | list)) }}"
        k3s_healthy: >-
          {{
            (evaluated_kubeconfigs | default([])
             | selectattr('path', 'equalto', '/etc/rancher/k3s/k3s.yaml')
             | selectattr('healthy', 'equalto', true)
             | list | length) > 0
          }}

    - name: Emit pre-repair diagnostics summary
      ansible.builtin.debug:
        msg:
          kubeconfig_env: "{{ current_kubeconfig_env }}"
          kubectl_current_context_rc: "{{ kubectl_current_context.rc }}"
          kubectl_current_context: "{{ kubectl_current_context_name }}"
          kubectl_cluster_info_rc: "{{ kubectl_cluster_info_current.rc }}"
          kubectl_cluster_info_stderr: "{{ kubectl_cluster_info_current.stderr | default('') }}"
          current_kubeconfig_contexts: "{{ current_kubeconfig_contexts }}"
          current_kubeconfig_servers: "{{ current_kubeconfig_servers }}"
          active_k3s_services: "{{ active_k3s_services }}"
          k3s_installed: "{{ k3s_installed }}"
          k3s_healthy: "{{ k3s_healthy }}"
          evaluated_kubeconfigs: "{{ evaluated_kubeconfigs | default([]) }}"
          preferred_kubeconfig: "{{ preferred_kubeconfig | default({}) }}"

    - name: Assert a healthy cluster and valid kubeconfig source were discovered
      ansible.builtin.assert:
        that:
          - preferred_kubeconfig is mapping
          - preferred_kubeconfig.path is defined
          - preferred_kubeconfig.path | length > 0
          - preferred_kubeconfig.healthy | default(false)
        fail_msg: >-
          No healthy cluster or valid kubeconfig could be found on the control host.
          Diagnostics: active KUBECONFIG={{ current_kubeconfig_env | default('') }},
          kubectl current-context={{ kubectl_current_context_name | default('') }},
          current servers={{ current_kubeconfig_servers | default([]) }},
          k3s_installed={{ k3s_installed }}, k3s_healthy={{ k3s_healthy }},
          evaluated kubeconfigs={{ evaluated_kubeconfigs | default([]) }}.
        success_msg: A healthy kubeconfig source was discovered.

    - name: Ensure target kubeconfig directory exists with safe permissions
      ansible.builtin.file:
        path: "{{ kubeconfig_target_dir }}"
        state: directory
        owner: "{{ kubeconfig_target_user }}"
        group: "{{ kubeconfig_target_user }}"
        mode: '0700'

    - name: Read preferred kubeconfig source content
      ansible.builtin.slurp:
        src: "{{ preferred_kubeconfig.path }}"
      register: preferred_kubeconfig_content

    - name: Parse preferred kubeconfig source YAML
      ansible.builtin.set_fact:
        preferred_kubeconfig_yaml: "{{ preferred_kubeconfig_content.content | b64decode | from_yaml }}"

    - name: Repair user-accessible kubeconfig to use healthy cluster endpoint
      ansible.builtin.copy:
        dest: "{{ kubeconfig_target_file }}"
        content: "{{ preferred_kubeconfig_yaml | to_nice_yaml(indent=2) }}"
        owner: "{{ kubeconfig_target_user }}"
        group: "{{ kubeconfig_target_user }}"
        mode: '0600'
      register: kubeconfig_repair_copy

    - name: Validate repaired kubeconfig and Kubernetes client access
      block:
        - name: Run kubectl current-context against repaired kubeconfig
          ansible.builtin.command: kubectl --kubeconfig {{ kubeconfig_target_file }} config current-context
          register: repaired_current_context
          changed_when: false

        - name: Run kubectl config view against repaired kubeconfig
          ansible.builtin.command: kubectl --kubeconfig {{ kubeconfig_target_file }} config view --raw -o json
          register: repaired_config_view
          changed_when: false
          failed_when: false

        - name: Run kubectl cluster-info against repaired kubeconfig
          ansible.builtin.command: kubectl --kubeconfig {{ kubeconfig_target_file }} cluster-info
          register: repaired_cluster_info
          changed_when: false
          retries: 5
          delay: 5
          until: repaired_cluster_info.rc == 0

        - name: Run kubectl get nodes against repaired kubeconfig
          ansible.builtin.command: kubectl --kubeconfig {{ kubeconfig_target_file }} get nodes -o json
          register: repaired_get_nodes
          changed_when: false
          retries: 5
          delay: 5
          until: repaired_get_nodes.rc == 0

        - name: Run helm list against repaired kubeconfig
          ansible.builtin.command: helm --kubeconfig {{ kubeconfig_target_file }} list --all-namespaces -o json
          register: repaired_helm_list
          changed_when: false
          retries: 5
          delay: 5
          until: repaired_helm_list.rc == 0

        - name: Parse repaired kubeconfig and cluster validation data
          ansible.builtin.set_fact:
            repaired_config_json: >-
              {{
                (repaired_config_view.stdout | from_json)
                if (repaired_config_view.rc == 0 and (repaired_config_view.stdout | default('') | length > 0))
                else {}
              }}
            repaired_node_json: "{{ repaired_get_nodes.stdout | from_json }}"
            repaired_helm_json: "{{ repaired_helm_list.stdout | from_json }}"

        - name: Build repaired kubeconfig cluster diagnostics
          ansible.builtin.set_fact:
            repaired_config_clusters: "{{ repaired_config_json['clusters'] | default([]) }}"
            repaired_node_items: "{{ repaired_node_json['items'] | default([]) }}"

        - name: Build repaired kubeconfig server diagnostics
          ansible.builtin.set_fact:
            repaired_config_servers: "{{ repaired_config_clusters | map(attribute='cluster') | map(attribute='server') | list }}"

        - name: Assert repaired kubeconfig provides working kubectl and helm access
          ansible.builtin.assert:
            that:
              - repaired_current_context.rc == 0
              - (repaired_current_context.stdout | trim | length) > 0
              - repaired_cluster_info.rc == 0
              - repaired_get_nodes.rc == 0
              - (repaired_node_items | length) > 0
              - repaired_helm_list.rc == 0
            fail_msg: >-
              Repaired kubeconfig did not produce healthy Kubernetes client access.
              kubeconfig={{ kubeconfig_target_file }},
              current_context={{ repaired_current_context.stdout | default('') | trim }},
              servers={{ repaired_config_servers | default([]) }},
              cluster_info_stderr={{ repaired_cluster_info.stderr | default('') }},
              get_nodes_stderr={{ repaired_get_nodes.stderr | default('') }},
              helm_stderr={{ repaired_helm_list.stderr | default('') }}.
            success_msg: Repaired kubeconfig provides working kubectl and helm access.

      rescue:
        - name: Emit repaired kubeconfig failure diagnostics
          ansible.builtin.debug:
            msg:
              kubeconfig_target_file: "{{ kubeconfig_target_file }}"
              repaired_current_context:
                rc: "{{ repaired_current_context.rc | default('n/a') }}"
                stdout: "{{ repaired_current_context.stdout | default('') }}"
                stderr: "{{ repaired_current_context.stderr | default('') }}"
              repaired_cluster_info:
                rc: "{{ repaired_cluster_info.rc | default('n/a') }}"
                stdout: "{{ repaired_cluster_info.stdout | default('') }}"
                stderr: "{{ repaired_cluster_info.stderr | default('') }}"
              repaired_get_nodes:
                rc: "{{ repaired_get_nodes.rc | default('n/a') }}"
                stdout: "{{ repaired_get_nodes.stdout | default('') }}"
                stderr: "{{ repaired_get_nodes.stderr | default('') }}"
              repaired_helm_list:
                rc: "{{ repaired_helm_list.rc | default('n/a') }}"
                stdout: "{{ repaired_helm_list.stdout | default('') }}"
                stderr: "{{ repaired_helm_list.stderr | default('') }}"
              evaluated_kubeconfigs: "{{ evaluated_kubeconfigs | default([]) }}"
              preferred_kubeconfig: "{{ preferred_kubeconfig | default({}) }}"

        - name: Fail clearly when kubeconfig repair validation did not succeed
          ansible.builtin.fail:
            msg: >-
              Kubernetes client configuration repair failed validation.
              Review the emitted diagnostics for kubectl, helm, kubeconfig servers,
              and discovered kubeconfig candidates.

    - name: Collect final kubeconfig file metadata
      ansible.builtin.stat:
        path: "{{ kubeconfig_target_file }}"
      register: kubeconfig_target_stat

    - name: Emit final machine-readable repair summary
      ansible.builtin.debug:
        msg:
          repaired: true
          kubeconfig_target_user: "{{ kubeconfig_target_user }}"
          kubeconfig_target_home: "{{ kubeconfig_target_home }}"
          kubeconfig_target_file: "{{ kubeconfig_target_file }}"
          kubeconfig_target_mode: "{{ kubeconfig_target_stat.stat.mode | default('') }}"
          kubeconfig_target_owner: "{{ kubeconfig_target_stat.stat.pw_name | default('') }}"
          kubeconfig_target_group: "{{ kubeconfig_target_stat.stat.gr_name | default('') }}"
          source_kubeconfig: "{{ preferred_kubeconfig.path }}"
          source_servers: "{{ preferred_kubeconfig.servers | default([]) }}"
          current_context: "{{ repaired_current_context.stdout | trim }}"
          node_count: "{{ repaired_node_items | length }}"
          node_names: "{{ repaired_node_items | map(attribute='metadata') | map(attribute='name') | list }}"
          helm_release_count: "{{ repaired_helm_json | default([]) | length }}"
          k3s_installed: "{{ k3s_installed }}"
          k3s_healthy: "{{ k3s_healthy }}"
          previous_kubeconfig_env: "{{ current_kubeconfig_env }}"
          previous_current_context: "{{ kubectl_current_context_name }}"
          previous_servers: "{{ current_kubeconfig_servers }}"
