# name: hello_world_playbook
# description: This playbook runs on localhost to validate and print a 'Hello, world!' message, confirming the desired state is achieved without making any changes or requiring special permissions.
# target: control
# requires_approval: false
# tags:
#   - local
#   - validation
#   - message
#   - hello_world

---
- name: Hello world playbook for local nodes
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    hello_world_reset: false
  tasks:
    - name: Validate hello world message is already the desired end state
      ansible.builtin.assert:
        that:
          - hello_world_message == 'Hello, world!'
        fail_msg: >-
          The desired hello world message is not set correctly. Expected 'Hello, world!' but got
          '{{ hello_world_message | default("undefined") }}'.
        success_msg: "The desired hello world message is set correctly."
      vars:
        hello_world_message: "Hello, world!"

    - name: Print Hello, world! message for local nodes
      ansible.builtin.debug:
        msg: "Hello, world!"

    - name: Emit final hello world state summary
      ansible.builtin.debug:
        msg:
          playbook: "Hello world playbook for local nodes"
          description: "Runs on localhost without privilege escalation and prints a simple hello world message."
          hosts: ["localhost"]
          connection: "local"
          become: false
          reset_supported: "{{ hello_world_reset }}"
          message: "Hello, world!"
