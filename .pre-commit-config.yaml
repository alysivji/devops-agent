repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: format-markdown
        name: format-markdown
        entry: uv run python scripts/format_markdown.py
        language: system
        files: \.md$
      - id: markdownlint
        name: markdownlint
        entry: npm exec -- markdownlint-cli2
        language: system
        files: \.md$
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
