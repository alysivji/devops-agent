- name: minio
  description: S3-compatible object storage on the control node for local infrastructure and session storage experiments.
  runtime: systemd
  location: control
  status: expected
  managed_by: ansible/playbooks/deploy-and-validate-minio.yaml
  endpoints:
    - name: api
      url: http://127.0.0.1:9000
      protocol: http
      scope: control-node-local
    - name: console
      url: http://127.0.0.1:9001
      protocol: http
      scope: control-node-local
  tags:
    - storage
    - s3
- name: grafana
  description: Control-node Grafana instance for dashboards backed by local Prometheus and related observability data sources.
  runtime: systemd
  location: control
  status: expected
  managed_by: ansible/playbooks/install-grafana.yaml
  endpoints:
    - name: health
      url: http://127.0.0.1:3000/api/health
      protocol: http
      scope: control-node-local
  tags:
    - monitoring
    - dashboards
- name: prometheus
  description: Control-node Prometheus server for scraping Kubernetes and host metrics and serving local readiness and query endpoints.
  runtime: systemd
  location: control
  status: expected
  managed_by: ansible/playbooks/install-prometheus.yaml
  endpoints:
    - name: readiness
      url: http://127.0.0.1:9090/-/ready
      protocol: http
      scope: control-node-local
  tags:
    - monitoring
    - metrics
- name: nginx
  description: Kubernetes nginx workload exposed through a NodePort service from the repo-owned wrapper chart in the default namespace.
  runtime: kubernetes
  location: default
  status: expected
  managed_by: helm/charts/nginx
  endpoints:
    - name: http
      host: <node-ip>
      port: 30080
      protocol: http
      scope: lan
      notes: NodePort service `nginx-upstream` in namespace `default`.
    - name: https
      host: <node-ip>
      port: 30443
      protocol: https
      scope: lan
      notes: NodePort service `nginx-upstream` in namespace `default`.
  tags:
    - kubernetes
    - web
    - nodeport
