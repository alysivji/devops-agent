        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n</pre></div>\n</div>\n</section>\n<section
        id=\"return-values\">\n<h2><a class=\"toc-backref\" href=\"#id13\" role=\"doc-backlink\">Return
