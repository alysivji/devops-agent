        to this return value\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">integer</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>time of the last cache update (0 if unknown)</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-returned-bold\">Returned:</strong>
        success, in some cases</p>\n<p class=\"ansible-option-line ansible-option-sample\"><strong
        class=\"ansible-option-sample-bold\">Sample:</strong> <code class=\"ansible-option-sample
        docutils literal notranslate\"><span class=\"pre\">1425828348000</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"return-cache_updated\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-return-cache-updated\"><strong>cache_updated</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#return-cache_updated\" title=\"Permalink
        to this return value\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
