        to this module:</p>\n<table class=\"longtable ansible-option-table docutils
        align-default\" style=\"width: 100%\">\n<thead>\n<tr class=\"row-odd\"><th
        class=\"head\"><p>Key</p></th>\n<th class=\"head\"><p>Description</p></th>\n</tr>\n</thead>\n<tbody>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"return-cache_update_time\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-return-cache-update-time\"><strong>cache_update_time</strong></p>\n<a
