        class=\"ansible-option-sample-bold\">Sample:</strong> <code class=\"ansible-option-sample
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
