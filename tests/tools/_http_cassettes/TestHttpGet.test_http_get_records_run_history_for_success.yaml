        \ <span class=\"target\" id=\"ansible-collections-ansible-builtin-apt-module\"></span><span
        class=\"target\" id=\"apt-module\"></span><section id=\"ansible-builtin-apt-module-manages-apt-packages\">\n<h1>ansible.builtin.apt
        module \u2013 Manages apt-packages<a class=\"headerlink\" href=\"#ansible-builtin-apt-module-manages-apt-packages\"
        title=\"Link to this heading\">\uF0C1</a></h1>\n<div class=\"admonition note\">\n<p
        class=\"admonition-title\">Note</p>\n<p>This module    is part of <code class=\"docutils
        literal notranslate\"><span class=\"pre\">ansible-core</span></code> and included
        in all Ansible\ninstallations. In most cases, you can use the short\nmodule
        name\n<code class=\"code docutils literal notranslate\"><span class=\"pre\">apt</span></code>
        even without specifying the <a class=\"reference internal\" href=\"../../../collections_guide/collections_using_playbooks.html#collections-keyword\"><span
        class=\"std std-ref\">collections keyword</span></a>.\nHowever, we recommend
        you use the <a class=\"reference internal\" href=\"../../../reference_appendices/glossary.html#term-Fully-Qualified-Collection-Name-FQCN\"><span
        class=\"xref std std-term\">Fully Qualified Collection Name (FQCN)</span></a>
        <code class=\"code docutils literal notranslate\"><span class=\"pre\">ansible.builtin.apt</span></code>
        for easy linking to the\nmodule    documentation and to avoid conflicting
        with other collections that may have\nthe same module name.</p>\n</div>\n<nav
        class=\"contents local\" id=\"contents\">\n<ul class=\"simple\">\n<li><p><a
        class=\"reference internal\" href=\"#synopsis\" id=\"id7\">Synopsis</a></p></li>\n<li><p><a
        class=\"reference internal\" href=\"#requirements\" id=\"id8\">Requirements</a></p></li>\n<li><p><a
        class=\"reference internal\" href=\"#parameters\" id=\"id9\">Parameters</a></p></li>\n<li><p><a
        class=\"reference internal\" href=\"#attributes\" id=\"id10\">Attributes</a></p></li>\n<li><p><a
        class=\"reference internal\" href=\"#notes\" id=\"id11\">Notes</a></p></li>\n<li><p><a
        class=\"reference internal\" href=\"#examples\" id=\"id12\">Examples</a></p></li>\n<li><p><a
        class=\"reference internal\" href=\"#return-values\" id=\"id13\">Return Values</a></p></li>\n</ul>\n</nav>\n<section
        id=\"synopsis\">\n<h2><a class=\"toc-backref\" href=\"#id7\" role=\"doc-backlink\">Synopsis</a><a
        class=\"headerlink\" href=\"#synopsis\" title=\"Link to this heading\">\uF0C1</a></h2>\n<ul
        class=\"simple\">\n<li><p>Manages <em>apt</em> packages (such as for Debian/Ubuntu).</p></li>\n</ul>\n</section>\n<section
        id=\"requirements\">\n<span id=\"ansible-collections-ansible-builtin-apt-module-requirements\"></span><h2><a
        class=\"toc-backref\" href=\"#id8\" role=\"doc-backlink\">Requirements</a><a
        class=\"headerlink\" href=\"#requirements\" title=\"Link to this heading\">\uF0C1</a></h2>\n<p>The
        below requirements are needed on the host that executes this module.</p>\n<ul
        class=\"simple\">\n<li><p>python3-apt</p></li>\n<li><p>aptitude (before 2.4)</p></li>\n</ul>\n</section>\n<section
        id=\"parameters\">\n<h2><a class=\"toc-backref\" href=\"#id9\" role=\"doc-backlink\">Parameters</a><a
        class=\"headerlink\" href=\"#parameters\" title=\"Link to this heading\">\uF0C1</a></h2>\n<table
        class=\"longtable ansible-option-table docutils align-default\" style=\"width:
        100%\">\n<thead>\n<tr class=\"row-odd\"><th class=\"head\"><p>Parameter</p></th>\n<th
        class=\"head\"><p>Comments</p></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"row-even\"><td><div
        class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\" id=\"parameter-allow_change_held_packages\"></div><p
        class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-allow-change-held-packages\"><strong>allow_change_held_packages</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-allow_change_held_packages\"
        title=\"Permalink to this option\"></a><p class=\"ansible-option-type-line\"><span
        class=\"ansible-option-type\">boolean</span></p>\n<p><em class=\"ansible-option-versionadded\">added
        in ansible-core 2.13</em></p>\n</div></td>\n<td><div class=\"ansible-option-cell\"><p>Allows
        changing the version of a package which is on the apt hold list.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-default-bold docutils literal notranslate\"><strong><span
        class=\"pre\">false</span></strong></code> <span class=\"ansible-option-choices-default-mark\">\u2190
        (default)</span></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-allow_downgrade\"></div>\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-allow-downgrade\"></div>\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-allow_downgrades\"></div>\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-allow-downgrades\"></div><p class=\"ansible-option-title\"
        id=\"id2\"><span id=\"id1\"></span><span id=\"ansible-collections-ansible-builtin-apt-module-parameter-allow-downgrades\"></span><span
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-allow-downgrade\"></span><strong>allow_downgrade</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-allow_downgrade\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-aliases\">aliases:
        allow-downgrade, allow_downgrades, allow-downgrades</span></p>\n<p class=\"ansible-option-type-line\"><span
        class=\"ansible-option-type\">boolean</span></p>\n<p><em class=\"ansible-option-versionadded\">added
        in ansible-core 2.12</em></p>\n</div></td>\n<td><div class=\"ansible-option-cell\"><p>Corresponds
        to the <code class=\"docutils literal notranslate\"><span class=\"pre\">--allow-downgrades</span></code>
        option for <em>apt</em>.</p>\n<p>This option enables the named package and
        version to replace an already installed higher version of that package.</p>\n<p>Note
        that setting <code class=\"ansible-option-value docutils literal notranslate\"><a
        class=\"reference internal\" href=\"#id1\"><span class=\"std std-ref\"><span
        class=\"pre\">allow_downgrade=true</span></span></a></code> can make this
        module behave in a non-idempotent way.</p>\n<p>(The task could end up with
        a set of packages that does not match the complete list of specified packages
        to install).</p>\n<p><code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#id1\"><span class=\"std std-ref\"><span
        class=\"pre\">allow_downgrade</span></span></a></strong></code> is only supported
        by <code class=\"docutils literal notranslate\"><span class=\"pre\">apt</span></code>
        and will be ignored if <code class=\"docutils literal notranslate\"><span
        class=\"pre\">aptitude</span></code> is detected or specified.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-default-bold docutils literal notranslate\"><strong><span
        class=\"pre\">false</span></strong></code> <span class=\"ansible-option-choices-default-mark\">\u2190
        (default)</span></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-allow_unauthenticated\"></div>\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-allow-unauthenticated\"></div><p class=\"ansible-option-title\"
        id=\"id3\"><span id=\"ansible-collections-ansible-builtin-apt-module-parameter-allow-unauthenticated\"></span><strong>allow_unauthenticated</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-allow_unauthenticated\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-aliases\">aliases:
        allow-unauthenticated</span></p>\n<p class=\"ansible-option-type-line\"><span
        class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div class=\"ansible-option-cell\"><p>Ignore
        if packages cannot be authenticated. This is useful for bootstrapping environments
        that manage their own apt-key setup.</p>\n<p><code class=\"ansible-option
        docutils literal notranslate\"><strong><a class=\"reference internal\" href=\"#id3\"><span
        class=\"std std-ref\"><span class=\"pre\">allow_unauthenticated</span></span></a></strong></code>
        is only supported with <code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-state\"><span
        class=\"std std-ref\"><span class=\"pre\">state</span></span></a></strong></code>:
        <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">install</span></code>/<code
        class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">present</span></code>.</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-auto_install_module_deps\"></div><p class=\"ansible-option-title\"
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-auto-install-module-deps\"><strong>auto_install_module_deps</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-auto_install_module_deps\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n<p><em
        class=\"ansible-option-versionadded\">added in ansible-core 2.19</em></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Automatically install dependencies required
        to run this module.</p>\n<p class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-choices-entry docutils
        literal notranslate\"><span class=\"pre\">false</span></code></p></li>\n<li><p><code
        class=\"ansible-option-default-bold docutils literal notranslate\"><strong><span
        class=\"pre\">true</span></strong></code> <span class=\"ansible-option-choices-default-mark\">\u2190
        (default)</span></p></li>\n</ul>\n</div></td>\n</tr>\n<tr class=\"row-even\"><td><div
        class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\" id=\"parameter-autoclean\"></div><p
        class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-autoclean\"><strong>autoclean</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-autoclean\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>If <code class=\"ansible-value docutils literal
        notranslate\"><span class=\"pre\">true</span></code>, cleans the local repository
        of retrieved package files that can no longer be downloaded.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-default-bold docutils literal notranslate\"><strong><span
        class=\"pre\">false</span></strong></code> <span class=\"ansible-option-choices-default-mark\">\u2190
        (default)</span></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-autoremove\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-autoremove\"><strong>autoremove</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-autoremove\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>If <code class=\"ansible-value docutils literal
        notranslate\"><span class=\"pre\">true</span></code>, remove unused dependency
        packages for all module states except <code class=\"ansible-value docutils
        literal notranslate\"><span class=\"pre\">build-dep</span></code>. It can
        also be used as the only option.</p>\n<p>Previous to version 2.4, <code class=\"ansible-option
        docutils literal notranslate\"><strong><a class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-autoclean\"><span
        class=\"std std-ref\"><span class=\"pre\">autoclean</span></span></a></strong></code>
        was also an alias for <code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-autoremove\"><span
        class=\"std std-ref\"><span class=\"pre\">autoremove</span></span></a></strong></code>,
        now it is its own separate command. See documentation for further information.</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-cache_valid_time\"></div><p class=\"ansible-option-title\"
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-cache-valid-time\"><strong>cache_valid_time</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-cache_valid_time\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">integer</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Update the apt cache if it is older than
        the <code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-cache-valid-time\"><span
        class=\"std std-ref\"><span class=\"pre\">cache_valid_time</span></span></a></strong></code>.
        This option is set in seconds.</p>\n<p>As of Ansible 2.4, if explicitly set,
        this sets <code class=\"ansible-option-value docutils literal notranslate\"><a
        class=\"reference internal\" href=\"#id6\"><span class=\"std std-ref\"><span
        class=\"pre\">update_cache=yes</span></span></a></code>.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-default-bold\">Default:</strong> <code class=\"ansible-option-default
        docutils literal notranslate\"><span class=\"pre\">0</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-clean\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-clean\"><strong>clean</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-clean\" title=\"Permalink to
        this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n<p><em
        class=\"ansible-option-versionadded\">added in ansible-core 2.13</em></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Run the equivalent of <code class=\"docutils
        literal notranslate\"><span class=\"pre\">apt-get</span> <span class=\"pre\">clean</span></code>
        to clear out the local repository of retrieved package files. It removes everything
        but the lock file from <code class=\"docutils literal notranslate\"><span
        class=\"pre\">/var/cache/apt/archives/</span></code> and <code class=\"docutils
        literal notranslate\"><span class=\"pre\">/var/cache/apt/archives/partial/</span></code>.</p>\n<p>Can
        be run as part of the package installation (clean runs before install) or
        as a separate step.</p>\n<p class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-deb\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-deb\"><strong>deb</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-deb\" title=\"Permalink to this
        option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">path</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Path to a .deb package on the remote machine.</p>\n<p>If
        <code class=\"docutils literal notranslate\"><span class=\"pre\">://</span></code>
        in the path, ansible will attempt to download deb before installing. (Version
        added 2.1)</p>\n<p>Requires the <code class=\"docutils literal notranslate\"><span
        class=\"pre\">xz-utils</span></code> package to extract the control file of
        the deb package to install.</p>\n</div></td>\n</tr>\n<tr class=\"row-odd\"><td><div
        class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\" id=\"parameter-default_release\"></div>\n<div
        class=\"ansibleOptionAnchor\" id=\"parameter-default-release\"></div><p class=\"ansible-option-title\"
        id=\"id4\"><span id=\"ansible-collections-ansible-builtin-apt-module-parameter-default-release\"></span><strong>default_release</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-default_release\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-aliases\">aliases:
        default-release</span></p>\n<p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">string</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Corresponds to the <code class=\"docutils
        literal notranslate\"><span class=\"pre\">-t</span></code> option for <em>apt</em>
        and sets pin priorities.</p>\n</div></td>\n</tr>\n<tr class=\"row-even\"><td><div
        class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\" id=\"parameter-dpkg_options\"></div><p
        class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-dpkg-options\"><strong>dpkg_options</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-dpkg_options\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">string</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Add <code class=\"docutils literal notranslate\"><span
        class=\"pre\">dpkg</span></code> options to <code class=\"docutils literal
        notranslate\"><span class=\"pre\">apt</span></code> command. Defaults to <code
        class=\"docutils literal notranslate\"><span class=\"pre\">-o</span> <span
        class=\"pre\">&quot;Dpkg::Options::=--force-confdef&quot;</span> <span class=\"pre\">-o</span>
        <span class=\"pre\">&quot;Dpkg::Options::=--force-confold&quot;</span></code>.</p>\n<p>Options
        should be supplied as comma separated list.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-default-bold\">Default:</strong> <code class=\"ansible-option-default
        docutils literal notranslate\"><span class=\"pre\">&quot;force-confdef,force-confold&quot;</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-fail_on_autoremove\"></div><p class=\"ansible-option-title\"
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-fail-on-autoremove\"><strong>fail_on_autoremove</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-fail_on_autoremove\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n<p><em
        class=\"ansible-option-versionadded\">added in ansible-core 2.11</em></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Corresponds to the <code class=\"docutils
        literal notranslate\"><span class=\"pre\">--no-remove</span></code> option
        for <code class=\"docutils literal notranslate\"><span class=\"pre\">apt</span></code>.</p>\n<p>If
        <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">true</span></code>,
        it is ensured that no packages will be removed or the task will fail.</p>\n<p><code
        class=\"ansible-option docutils literal notranslate\"><strong><a class=\"reference
        internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-fail-on-autoremove\"><span
        class=\"std std-ref\"><span class=\"pre\">fail_on_autoremove</span></span></a></strong></code>
        is only supported with <code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-state\"><span
        class=\"std std-ref\"><span class=\"pre\">state</span></span></a></strong></code>
        except <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">absent</span></code>.</p>\n<p><code
        class=\"ansible-option docutils literal notranslate\"><strong><a class=\"reference
        internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-fail-on-autoremove\"><span
        class=\"std std-ref\"><span class=\"pre\">fail_on_autoremove</span></span></a></strong></code>
        is only supported by <code class=\"docutils literal notranslate\"><span class=\"pre\">apt</span></code>
        and will be ignored if <code class=\"docutils literal notranslate\"><span
        class=\"pre\">aptitude</span></code> is detected or specified.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-default-bold docutils literal notranslate\"><strong><span
        class=\"pre\">false</span></strong></code> <span class=\"ansible-option-choices-default-mark\">\u2190
        (default)</span></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-force\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-force\"><strong>force</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-force\" title=\"Permalink to
        this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Corresponds to the <code class=\"docutils
        literal notranslate\"><span class=\"pre\">--force-yes</span></code> to <code
        class=\"docutils literal notranslate\"><span class=\"pre\">apt-get</span></code>
        and implies <code class=\"ansible-option-value docutils literal notranslate\"><a
        class=\"reference internal\" href=\"#id3\"><span class=\"std std-ref\"><span
        class=\"pre\">allow_unauthenticated=yes</span></span></a></code> and <code
        class=\"ansible-option-value docutils literal notranslate\"><a class=\"reference
        internal\" href=\"#id1\"><span class=\"std std-ref\"><span class=\"pre\">allow_downgrade=yes</span></span></a></code>.</p>\n<p>This
        option will disable checking both the packages\u2019 signatures and the certificates
        of the web servers they are downloaded from.</p>\n<p>This option *is not*
        the equivalent of passing the <code class=\"docutils literal notranslate\"><span
        class=\"pre\">-f</span></code> flag to <code class=\"docutils literal notranslate\"><span
        class=\"pre\">apt-get</span></code> on the command line.</p>\n<p>**This is
        a destructive operation with the potential to destroy your system, and it
        should almost never be used.** Please also see <code class=\"docutils literal
        notranslate\"><span class=\"pre\">man</span> <span class=\"pre\">apt-get</span></code>
        for more information.</p>\n<p class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-force_apt_get\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-force-apt-get\"><strong>force_apt_get</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-force_apt_get\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Force usage of apt-get instead of aptitude.</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-install_recommends\"></div>\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-install-recommends\"></div><p class=\"ansible-option-title\"
        id=\"id5\"><span id=\"ansible-collections-ansible-builtin-apt-module-parameter-install-recommends\"></span><strong>install_recommends</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-install_recommends\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-aliases\">aliases:
        install-recommends</span></p>\n<p class=\"ansible-option-type-line\"><span
        class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div class=\"ansible-option-cell\"><p>Corresponds
        to the <code class=\"docutils literal notranslate\"><span class=\"pre\">--no-install-recommends</span></code>
        option for <code class=\"docutils literal notranslate\"><span class=\"pre\">apt</span></code>.
        <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">true</span></code>
        installs recommended packages. <code class=\"ansible-value docutils literal
        notranslate\"><span class=\"pre\">false</span></code> does not install recommended
        packages. By default, Ansible will use the same defaults as the operating
        system. Suggested packages are never installed.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">false</span></code></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-lock_timeout\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-lock-timeout\"><strong>lock_timeout</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-lock_timeout\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">integer</span></p>\n<p><em
        class=\"ansible-option-versionadded\">added in ansible-core 2.12</em></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>How many seconds will this action wait to
        acquire a lock on the apt db.</p>\n<p>Sometimes there is a transitory lock
        and this will retry at least until timeout is hit.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-default-bold\">Default:</strong> <code class=\"ansible-option-default
        docutils literal notranslate\"><span class=\"pre\">60</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-name\"></div>\n<div class=\"ansibleOptionAnchor\" id=\"parameter-package\"></div>\n<div
        class=\"ansibleOptionAnchor\" id=\"parameter-pkg\"></div><p class=\"ansible-option-title\"
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-pkg\"><span
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-package\"></span><span
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-name\"></span><strong>name</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-name\" title=\"Permalink to
        this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-aliases\">aliases:
        package, pkg</span></p>\n<p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">list</span>
        / <span class=\"ansible-option-elements\">elements=string</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>A list of package names, like <code class=\"ansible-value
        docutils literal notranslate\"><span class=\"pre\">foo</span></code>, or package
        specifier with version, like <code class=\"ansible-value docutils literal
        notranslate\"><span class=\"pre\">foo=1.0</span></code> or <code class=\"ansible-value
        docutils literal notranslate\"><span class=\"pre\">foo&gt;=1.0</span></code>.
        Name wildcards (fnmatch) like <code class=\"ansible-value docutils literal
        notranslate\"><span class=\"pre\">apt*</span></code> and version wildcards
        like <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">foo=1.0*</span></code>
        are also supported.</p>\n<p>Do not use single or double quotes around the
        version when referring to the package name with a specific version, such as
        <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">foo=1.0</span></code>
        or <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">foo&gt;=1.0</span></code>.</p>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-only_upgrade\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-only-upgrade\"><strong>only_upgrade</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-only_upgrade\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Only upgrade a package if it is already installed.</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-policy_rc_d\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-policy-rc-d\"><strong>policy_rc_d</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-policy_rc_d\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">integer</span></p>\n<p><em
        class=\"ansible-option-versionadded\">added in Ansible 2.8</em></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Force the exit code of <code class=\"docutils
        literal notranslate\"><span class=\"pre\">/usr/sbin/policy-rc.d</span></code>.</p>\n<p>For
        example, if <code class=\"ansible-option-value docutils literal notranslate\"><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-policy-rc-d\"><span
        class=\"std std-ref\"><span class=\"pre\">policy_rc_d=101</span></span></a></code>
        the installed package will not trigger a service start.</p>\n<p>If <code class=\"docutils
        literal notranslate\"><span class=\"pre\">/usr/sbin/policy-rc.d</span></code>
        already exists, it is backed up and restored after the package installation.</p>\n<p>If
        <code class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">null</span></code>,
        the <code class=\"docutils literal notranslate\"><span class=\"pre\">/usr/sbin/policy-rc.d</span></code>
        is not created/changed.</p>\n</div></td>\n</tr>\n<tr class=\"row-odd\"><td><div
        class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\" id=\"parameter-purge\"></div><p
        class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-purge\"><strong>purge</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-purge\" title=\"Permalink to
        this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Will force purging of configuration files
        if <code class=\"ansible-option-value docutils literal notranslate\"><a class=\"reference
        internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-state\"><span
        class=\"std std-ref\"><span class=\"pre\">state=absent</span></span></a></code>
        or <code class=\"ansible-option-value docutils literal notranslate\"><a class=\"reference
        internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-autoremove\"><span
        class=\"std std-ref\"><span class=\"pre\">autoremove=yes</span></span></a></code>.</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-choices\">Choices:</strong></p>\n<ul
        class=\"simple\">\n<li><p><code class=\"ansible-option-default-bold docutils
        literal notranslate\"><strong><span class=\"pre\">false</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-state\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-state\"><strong>state</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-state\" title=\"Permalink to
        this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">string</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Indicates the desired package state. <code
        class=\"ansible-value docutils literal notranslate\"><span class=\"pre\">latest</span></code>
        ensures that the latest version is installed. <code class=\"ansible-value
        docutils literal notranslate\"><span class=\"pre\">build-dep</span></code>
        ensures the package build dependencies are installed. <code class=\"ansible-value
        docutils literal notranslate\"><span class=\"pre\">fixed</span></code> attempt
        to correct a system with broken dependencies in place.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">&quot;absent&quot;</span></code></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">&quot;build-dep&quot;</span></code></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">&quot;latest&quot;</span></code></p></li>\n<li><p><code class=\"ansible-option-default-bold
        docutils literal notranslate\"><strong><span class=\"pre\">&quot;present&quot;</span></strong></code>
        <span class=\"ansible-option-choices-default-mark\">\u2190 (default)</span></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">&quot;fixed&quot;</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-update_cache\"></div>\n<div class=\"ansibleOptionAnchor\" id=\"parameter-update-cache\"></div><p
        class=\"ansible-option-title\" id=\"id6\"><span id=\"ansible-collections-ansible-builtin-apt-module-parameter-update-cache\"></span><strong>update_cache</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-update_cache\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-aliases\">aliases:
        update-cache</span></p>\n<p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">boolean</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Run the equivalent of <code class=\"docutils
        literal notranslate\"><span class=\"pre\">apt-get</span> <span class=\"pre\">update</span></code>
        before the operation. Can be run as part of the package installation or as
        a separate step.</p>\n<p>Default is not to update the cache.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">false</span></code></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">true</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-update_cache_retries\"></div><p class=\"ansible-option-title\"
        id=\"ansible-collections-ansible-builtin-apt-module-parameter-update-cache-retries\"><strong>update_cache_retries</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-update_cache_retries\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">integer</span></p>\n<p><em
        class=\"ansible-option-versionadded\">added in ansible-base 2.10</em></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Amount of retries if the cache update fails.
        Also see <code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-update-cache-retry-max-delay\"><span
        class=\"std std-ref\"><span class=\"pre\">update_cache_retry_max_delay</span></span></a></strong></code>.</p>\n<p
        class=\"ansible-option-line\"><strong class=\"ansible-option-default-bold\">Default:</strong>
        <code class=\"ansible-option-default docutils literal notranslate\"><span
        class=\"pre\">5</span></code></p>\n</div></td>\n</tr>\n<tr class=\"row-odd\"><td><div
        class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\" id=\"parameter-update_cache_retry_max_delay\"></div><p
        class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-update-cache-retry-max-delay\"><strong>update_cache_retry_max_delay</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-update_cache_retry_max_delay\"
        title=\"Permalink to this option\"></a><p class=\"ansible-option-type-line\"><span
        class=\"ansible-option-type\">integer</span></p>\n<p><em class=\"ansible-option-versionadded\">added
        in ansible-base 2.10</em></p>\n</div></td>\n<td><div class=\"ansible-option-cell\"><p>Use
        an exponential backoff delay for each retry (see <code class=\"ansible-option
        docutils literal notranslate\"><strong><a class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-update-cache-retries\"><span
        class=\"std std-ref\"><span class=\"pre\">update_cache_retries</span></span></a></strong></code>)
        up to this max delay in seconds.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-default-bold\">Default:</strong> <code class=\"ansible-option-default
        docutils literal notranslate\"><span class=\"pre\">12</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"parameter-upgrade\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-parameter-upgrade\"><strong>upgrade</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#parameter-upgrade\" title=\"Permalink
        to this option\"></a><p class=\"ansible-option-type-line\"><span class=\"ansible-option-type\">string</span></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>If yes or safe, performs an aptitude safe-upgrade.</p>\n<p>If
        full, performs an aptitude full-upgrade.</p>\n<p>If dist, performs an apt-get
        dist-upgrade.</p>\n<p>Note: This does not upgrade a specific package, use
        state=latest for that.</p>\n<p>Note: Since 2.4, apt-get is used as a fall-back
        if aptitude is not present.</p>\n<p class=\"ansible-option-line\"><strong
        class=\"ansible-option-choices\">Choices:</strong></p>\n<ul class=\"simple\">\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">&quot;dist&quot;</span></code></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">&quot;full&quot;</span></code></p></li>\n<li><p><code
        class=\"ansible-option-default-bold docutils literal notranslate\"><strong><span
        class=\"pre\">&quot;no&quot;</span></strong></code> <span class=\"ansible-option-choices-default-mark\">\u2190
        (default)</span></p></li>\n<li><p><code class=\"ansible-option-choices-entry
        docutils literal notranslate\"><span class=\"pre\">&quot;safe&quot;</span></code></p></li>\n<li><p><code
        class=\"ansible-option-choices-entry docutils literal notranslate\"><span
        class=\"pre\">&quot;yes&quot;</span></code></p></li>\n</ul>\n</div></td>\n</tr>\n</tbody>\n</table>\n</section>\n<section
        id=\"attributes\">\n<h2><a class=\"toc-backref\" href=\"#id10\" role=\"doc-backlink\">Attributes</a><a
        class=\"headerlink\" href=\"#attributes\" title=\"Link to this heading\">\uF0C1</a></h2>\n<table
        class=\"longtable ansible-option-table docutils align-default\" style=\"width:
        100%\">\n<thead>\n<tr class=\"row-odd\"><th class=\"head\"><p>Attribute</p></th>\n<th
        class=\"head\"><p>Support</p></th>\n<th class=\"head\"><p>Description</p></th>\n</tr>\n</thead>\n<tbody>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"attribute-check_mode\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-attribute-check-mode\"><strong>check_mode</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#attribute-check_mode\" title=\"Permalink
        to this attribute\"></a></div></td>\n<td><div class=\"ansible-option-cell\"><p><strong
        class=\"ansible-attribute-support-label\">Support: </strong><strong class=\"ansible-attribute-support-full\">full</strong></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Can run in check_mode and return changed
        status prediction without modifying target, if not supported the action will
        be skipped.</p>\n</div></td>\n</tr>\n<tr class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div
        class=\"ansibleOptionAnchor\" id=\"attribute-diff_mode\"></div><p class=\"ansible-option-title\"
        id=\"ansible-collections-ansible-builtin-apt-module-attribute-diff-mode\"><strong>diff_mode</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#attribute-diff_mode\" title=\"Permalink
        to this attribute\"></a></div></td>\n<td><div class=\"ansible-option-cell\"><p><strong
        class=\"ansible-attribute-support-label\">Support: </strong><strong class=\"ansible-attribute-support-full\">full</strong></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Will return details on what has changed (or
        possibly needs changing in check_mode), when in diff mode</p>\n</div></td>\n</tr>\n<tr
        class=\"row-even\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
        id=\"attribute-platform\"></div><p class=\"ansible-option-title\" id=\"ansible-collections-ansible-builtin-apt-module-attribute-platform\"><strong>platform</strong></p>\n<a
        class=\"ansibleOptionLink\" href=\"#attribute-platform\" title=\"Permalink
        to this attribute\"></a></div></td>\n<td><div class=\"ansible-option-cell\"><p><strong
        class=\"ansible-attribute-support-property\">Platform:</strong>\_<strong class=\"ansible-attribute-support-full\">debian</strong></p>\n</div></td>\n<td><div
        class=\"ansible-option-cell\"><p>Target OS/families that can be operated against</p>\n</div></td>\n</tr>\n</tbody>\n</table>\n</section>\n<section
        id=\"notes\">\n<h2><a class=\"toc-backref\" href=\"#id11\" role=\"doc-backlink\">Notes</a><a
        class=\"headerlink\" href=\"#notes\" title=\"Link to this heading\">\uF0C1</a></h2>\n<div
        class=\"admonition note\">\n<p class=\"admonition-title\">Note</p>\n<ul class=\"simple\">\n<li><p>Three
        of the upgrade modes (<code class=\"ansible-value docutils literal notranslate\"><span
        class=\"pre\">full</span></code>, <code class=\"ansible-value docutils literal
        notranslate\"><span class=\"pre\">safe</span></code> and its alias <code class=\"ansible-value
        docutils literal notranslate\"><span class=\"pre\">true</span></code>) required
        <code class=\"docutils literal notranslate\"><span class=\"pre\">aptitude</span></code>
        up to 2.3, since 2.4 <code class=\"docutils literal notranslate\"><span class=\"pre\">apt-get</span></code>
        is used as a fall-back.</p></li>\n<li><p>In most cases, packages installed
        with <em>apt</em> will start newly installed services by default. Most distributions
        have mechanisms to avoid this. For example when installing Postgresql-9.5
        in Debian 9, creating an executable shell script (/usr/sbin/policy-rc.d) that
        throws a return code of 101 will stop Postgresql 9.5 starting up after install.
        Remove the file or its execute permission afterward.</p></li>\n<li><p>The
        <code class=\"docutils literal notranslate\"><span class=\"pre\">apt-get</span></code>
        commandline supports implicit regex matches here but we do not because it
        can let typos through easier (If you typo <code class=\"docutils literal notranslate\"><span
        class=\"pre\">foo</span></code> as <code class=\"docutils literal notranslate\"><span
        class=\"pre\">fo</span></code> apt-get would install packages that have \u201Cfo\u201D
        in their name with a warning and a prompt for the user. Since there are no
        warnings and prompts before installing, we disallow this. Use an explicit
        fnmatch pattern if you want wildcarding).</p></li>\n<li><p>When used with
        a <code class=\"docutils literal notranslate\"><span class=\"pre\">loop:</span></code>
        each package will be processed individually, it is much more efficient to
        pass the list directly to the <code class=\"ansible-option docutils literal
        notranslate\"><strong><a class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-name\"><span
        class=\"std std-ref\"><span class=\"pre\">name</span></span></a></strong></code>
        option.</p></li>\n<li><p>When <code class=\"ansible-option docutils literal
        notranslate\"><strong><a class=\"reference internal\" href=\"#id4\"><span
        class=\"std std-ref\"><span class=\"pre\">default_release</span></span></a></strong></code>
        is used, an implicit priority of 990 is used. This is the same behavior as
        <code class=\"docutils literal notranslate\"><span class=\"pre\">apt-get</span>
        <span class=\"pre\">-t</span></code>.</p></li>\n<li><p>When an exact version
        is specified, an implicit priority of 1001 is used.</p></li>\n<li><p>If the
        interpreter can\u2019t import <code class=\"docutils literal notranslate\"><span
        class=\"pre\">python3-apt</span></code> the module will check for it in system-owned
        interpreters as well. If the dependency can\u2019t be found, depending on
        the value of <code class=\"ansible-option docutils literal notranslate\"><strong><a
        class=\"reference internal\" href=\"#ansible-collections-ansible-builtin-apt-module-parameter-auto-install-module-deps\"><span
        class=\"std std-ref\"><span class=\"pre\">auto_install_module_deps</span></span></a></strong></code>
        the module will attempt to install it. If the dependency is found or installed,
        the module will be respawned under the correct interpreter.</p></li>\n</ul>\n</div>\n</section>\n<section
        id=\"examples\">\n<h2><a class=\"toc-backref\" href=\"#id12\" role=\"doc-backlink\">Examples</a><a
        class=\"headerlink\" href=\"#examples\" title=\"Link to this heading\">\uF0C1</a></h2>\n<div
        class=\"highlight-yaml+jinja notranslate\"><div class=\"highlight\"><pre><span></span><span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        apache httpd (state=present is optional)</span>\n<span class=\"w\">  </span><span
        class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">name</span><span class=\"p\">:</span><span class=\"w\">
        </span><span class=\"l l-Scalar l-Scalar-Plain\">apache2</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">present</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Update
        repositories cache and install &quot;foo&quot; package</span>\n<span class=\"w\">
        \ </span><span class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span
        class=\"w\">    </span><span class=\"nt\">name</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">foo</span>\n<span
        class=\"w\">    </span><span class=\"nt\">update_cache</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Remove
        &quot;foo&quot; package</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">foo</span>\n<span
        class=\"w\">    </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">absent</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        the package &quot;foo&quot;</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">foo</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        a list of packages</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">pkg</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"p p-Indicator\">-</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">foo</span>\n<span
        class=\"w\">    </span><span class=\"p p-Indicator\">-</span><span class=\"w\">
        </span><span class=\"l l-Scalar l-Scalar-Plain\">foo-tools</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        the version &#39;1.00&#39; of package &quot;foo&quot;</span>\n<span class=\"w\">
        \ </span><span class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span
        class=\"w\">    </span><span class=\"nt\">name</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">foo=1.00</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Update
        the repository cache and update package &quot;nginx&quot; to latest version
        using default release squeeze-backport</span>\n<span class=\"w\">  </span><span
        class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">name</span><span class=\"p\">:</span><span class=\"w\">
        </span><span class=\"l l-Scalar l-Scalar-Plain\">nginx</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">latest</span>\n<span
        class=\"w\">    </span><span class=\"nt\">default_release</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">squeeze-backports</span>\n<span
        class=\"w\">    </span><span class=\"nt\">update_cache</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        the version &#39;1.18.0&#39; of package &quot;nginx&quot; and allow potential
        downgrades</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">nginx=1.18.0</span>\n<span
        class=\"w\">    </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">present</span>\n<span
        class=\"w\">    </span><span class=\"nt\">allow_downgrade</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        zfsutils-linux with ensuring conflicted packages (e.g. zfs-fuse) will not
        be removed.</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">zfsutils-linux</span>\n<span
        class=\"w\">    </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">latest</span>\n<span
        class=\"w\">    </span><span class=\"nt\">fail_on_autoremove</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        latest version of &quot;openjdk-6-jdk&quot; ignoring &quot;install-recommends&quot;</span>\n<span
        class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span
        class=\"w\">    </span><span class=\"nt\">name</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">openjdk-6-jdk</span>\n<span
        class=\"w\">    </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">latest</span>\n<span
        class=\"w\">    </span><span class=\"nt\">install_recommends</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">no</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Update
        all packages to their latest version</span>\n<span class=\"w\">  </span><span
        class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">name</span><span class=\"p\">:</span><span class=\"w\">
        </span><span class=\"s\">&quot;*&quot;</span>\n<span class=\"w\">    </span><span
        class=\"nt\">state</span><span class=\"p\">:</span><span class=\"w\"> </span><span
        class=\"l l-Scalar l-Scalar-Plain\">latest</span>\n\n<span class=\"p p-Indicator\">-</span><span
        class=\"w\"> </span><span class=\"nt\">name</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Upgrade the
        OS (apt-get dist-upgrade)</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">upgrade</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">dist</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Run
        the equivalent of &quot;apt-get update&quot; as a separate step</span>\n<span
        class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span
        class=\"w\">    </span><span class=\"nt\">update_cache</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Only
        run &quot;update_cache=yes&quot; if the last one is more than 3600 seconds
        ago</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">update_cache</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n<span
        class=\"w\">    </span><span class=\"nt\">cache_valid_time</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">3600</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Pass
        options to dpkg on run</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">upgrade</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">dist</span>\n<span
        class=\"w\">    </span><span class=\"nt\">update_cache</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n<span
        class=\"w\">    </span><span class=\"nt\">dpkg_options</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"s\">&#39;force-confold,force-confdef&#39;</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        a .deb package</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">deb</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">/tmp/mypackage.deb</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        the build dependencies for package &quot;foo&quot;</span>\n<span class=\"w\">
        \ </span><span class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span
        class=\"w\">    </span><span class=\"nt\">pkg</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">foo</span>\n<span
        class=\"w\">    </span><span class=\"nt\">state</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">build-dep</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Install
        a .deb package from the internet</span>\n<span class=\"w\">  </span><span
        class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">deb</span><span class=\"p\">:</span><span class=\"w\">
        </span><span class=\"l l-Scalar l-Scalar-Plain\">https://example.com/python-ppq_0.1-1_all.deb</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Remove
        useless packages from the cache</span>\n<span class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span
        class=\"p\">:</span>\n<span class=\"w\">    </span><span class=\"nt\">autoclean</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Remove
        dependencies that are no longer required</span>\n<span class=\"w\">  </span><span
        class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span class=\"w\">
        \   </span><span class=\"nt\">autoremove</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Remove
        dependencies that are no longer required and purge their configuration files</span>\n<span
        class=\"w\">  </span><span class=\"nt\">ansible.builtin.apt</span><span class=\"p\">:</span>\n<span
        class=\"w\">    </span><span class=\"nt\">autoremove</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">yes</span>\n<span
        class=\"w\">    </span><span class=\"nt\">purge</span><span class=\"p\">:</span><span
        class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">true</span>\n\n<span
        class=\"p p-Indicator\">-</span><span class=\"w\"> </span><span class=\"nt\">name</span><span
        class=\"p\">:</span><span class=\"w\"> </span><span class=\"l l-Scalar l-Scalar-Plain\">Run
        the equivalent of &quot;apt-get clean&quot; as a separate step</span>\n<span
