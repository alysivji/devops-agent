        <span class=\"pre\">Set</span> <span class=\"pre\">the</span> <span class=\"pre\">'ServerName'</span>
        <span class=\"pre\">directive</span> <span class=\"pre\">globally</span> <span
        class=\"pre\">to</span> <span class=\"pre\">...&quot;</span></code></p>\n</div></td>\n</tr>\n<tr
        class=\"row-odd\"><td><div class=\"ansible-option-cell\">\n<div class=\"ansibleOptionAnchor\"
